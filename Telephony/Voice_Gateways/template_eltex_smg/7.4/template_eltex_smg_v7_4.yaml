              units: '%'
              tags:
                - tag: HW
                  value: CPU
            - uuid: e02cb4ed927947cdb9dd852244204853
              name: 'CPU {#SNMPINDEX} Usage %'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.35265.1.29.37.1.9.{#SNMPINDEX}'
              key: 'smg.cpu_usage[{#SNMPINDEX}]'
              delay: 30s
              history: 90d
              value_type: FLOAT
              units: '%'
              tags:
                - tag: HW
                  value: CPU
              trigger_prototypes:
                - uuid: d7c36c43f59245cbbadbe243362900b4
                  expression: 'last(/Eltex SMG Template v7/smg.cpu_usage[{#SNMPINDEX}]) > 80'
                  name: 'CPU {#SNMPINDEX} usage > 80%'
                  priority: WARNING
                  tags:
                    - tag: HW
                      value: CPU
                - uuid: 44ceb355a69f431e8bb3572ee98ad0cd
                  expression: 'last(/Eltex SMG Template v7/smg.cpu_usage[{#SNMPINDEX}]) > 95'
                  name: 'CPU {#SNMPINDEX} usage > 95%'
                  priority: AVERAGE
                  tags:
                    - tag: HW
                      value: CPU
            - uuid: b0e702a8478b4e15be137f25ed3d3a16
